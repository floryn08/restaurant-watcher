name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Lint Helm chart
        run: helm lint helm/restaurant-watcher

      - name: Render Helm chart
        run: helm template restaurant-watcher helm/restaurant-watcher
