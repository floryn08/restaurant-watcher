name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Capture current release tag
        id: before_release
        run: |
          echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture release outputs
        id: semantic
        run: |
          git fetch --tags --force
          previous_tag="${{ steps.before_release.outputs.tag }}"
          current_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ -n "$current_tag" ] && [ "$current_tag" != "$previous_tag" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${current_tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
            echo "new_release_version=" >> "$GITHUB_OUTPUT"
          fi

  docker:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.new_release_version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    needs: [release, docker]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.release.outputs.new_release_version }}
      CHART_DIR: helm/restaurant-watcher
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Stamp chart version
        # Bump both chart version and appVersion to match the semantic release version
        run: |
          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_DIR}/Chart.yaml"

      - name: Lint Helm chart
        run: helm lint "${CHART_DIR}"

      - name: Render Helm chart
        run: helm template restaurant-watcher "${CHART_DIR}"

      - name: Log in to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Package chart
        run: helm package "${CHART_DIR}" --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart to GHCR
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "restaurant-watcher-${VERSION}.tgz" "oci://ghcr.io/${REPO_OWNER}/charts"
