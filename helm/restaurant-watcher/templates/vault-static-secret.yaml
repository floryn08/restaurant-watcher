{{- if .Values.vault.enabled }}
# Vault Secrets Operator — syncs secrets from Vault KV into a Kubernetes Secret.
# Prerequisites: VSO CRDs installed and a VaultAuth resource configured in this namespace.
# Docs: https://developer.hashicorp.com/vault/docs/platform/k8s/vso
#
# Expected Vault secret keys (set these in Vault before deploying):
#   GOOGLE_MAPS_API_KEY
#   DISCORD_WEBHOOK_URL
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ include "restaurant-watcher.name" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "restaurant-watcher.labels" . | nindent 4 }}
spec:
  type: {{ .Values.vault.type }}
  mount: {{ .Values.vault.mount | quote }}
  path: {{ .Values.vault.path | quote }}
  refreshAfter: {{ .Values.vault.refreshAfter | quote }}
  vaultAuthRef: {{ .Values.vault.vaultAuthRef | quote }}
  destination:
    name: {{ .Values.vault.destination.name | quote }}
    create: true
    overwrite: {{ .Values.vault.destination.overwrite }}
{{- end }}
