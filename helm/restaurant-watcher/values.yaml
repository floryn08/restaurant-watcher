image:
  # Replace OWNER with your GitHub username or organisation
  repository: ghcr.io/OWNER/restaurant-watcher
  tag: latest
  pullPolicy: Always

# Cron schedule — every Monday at 04:00 UTC
schedule: "0 4 * * 1"

# Non-secret configuration (bounding box, grid, file paths, Ollama)
config:
  swLat: "45.638"
  swLng: "25.584"
  neLat: "45.646"
  neLng: "25.597"
  gridSize: "4"
  dataFile: "/data/city_center_registry.json"
  ollamaHost: "http://ollama:11434"
  ollamaModel: "llama3.2"

# PVC for the registry JSON that persists across CronJob runs
persistence:
  storageClass: ""       # Leave empty to use the cluster default
  accessMode: ReadWriteOnce
  size: 100Mi

# Vault Secrets Operator — VaultStaticSecret that syncs secrets into a K8s Secret.
# The resulting secret exposes GOOGLE_MAPS_API_KEY and DISCORD_WEBHOOK_URL to the pod.
# See: https://developer.hashicorp.com/vault/docs/platform/k8s/vso/api-reference#vaultstaticsecret
vault:
  type: kv-v2            # kv-v1 or kv-v2
  mount: secret          # Vault KV mount path
  path: restaurant-watcher/config   # Path within the mount
  refreshAfter: 1h
  vaultAuthRef: default  # Name of the VaultAuth resource in the same namespace
  destination:
    name: restaurant-watcher-secrets  # Name of the K8s Secret that VSO creates

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
