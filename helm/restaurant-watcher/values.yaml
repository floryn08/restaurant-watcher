image:
  repository: ghcr.io/floryn08/restaurant-watcher
  tag: ""
  pullPolicy: IfNotPresent

# Target namespace for rendered resources
namespace: utility-services

# Cron schedule — every Monday at 04:00 UTC
schedule: "0 4 * * 1"
activeDeadlineSeconds: 1800
ttlSecondsAfterFinished: 86400

# Non-secret configuration (bounding box, grid, file paths, Ollama)
config:
  swLat: "45.612356"
  swLng: "25.566216"
  neLat: "45.678301"
  neLng: "25.664063"
  gridSize: "4"
  dataFile: "/data/city_center_registry.json"
  ollamaHost: "http://ollama.ai-services.svc:11434"
  ollamaModel: "gemma4:e4b"
  requestTimeoutMs: "30000"
  ollamaTimeoutMs: "60000"
  notifyOnInitialScan: "false"

# PVC for the registry JSON that persists across CronJob runs
persistence:
  storageClass: ""       # Leave empty to use the cluster default
  accessMode: ReadWriteOnce
  size: 100Mi
  pv:
    enabled: false
    storageClass: manual
    path: /srv/appdata/utility-services/restaurant-watcher
    type: DirectoryOrCreate
    reclaimPolicy: Retain

# Vault Secrets Operator — VaultStaticSecret that syncs secrets into a K8s Secret.
# The resulting secret exposes GOOGLE_MAPS_API_KEY and DISCORD_WEBHOOK_URL to the pod.
# See: https://developer.hashicorp.com/vault/docs/platform/k8s/vso/api-reference#vaultstaticsecret
vault:
  enabled: true
  type: kv-v2
  mount: kv
  path: utility-services/restaurant-watcher
  refreshAfter: 1h
  vaultAuthRef: vaultauth-utility-services
  destination:
    name: restaurant-watcher
    overwrite: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
